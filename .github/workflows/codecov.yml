name: Pagos MS - CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: neon-testing-database-lock
  cancel-in-progress: true

jobs:
  # --- ETAPA 1: CI (Integración Continua) ---
  test-and-coverage:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip==24.3.1
          if [ -f requirements.txt ]; then pip install --only-binary :all: -r requirements.txt; fi
          pip install --only-binary :all: pytest==9.0.3 pytest-cov==7.1.0

      - name: Correr tests con reporte XML
        env:
          TEST_POSTGRES_URL: "postgresql://testuser:testpass@localhost:5432/testdb"
          DATABASE_URL: "postgresql://testuser:testpass@localhost:5432/testdb"
          MP_ACCESS_TOKEN_TEST: mptoken
        run: |
          python -m pytest --cov=app --cov-report=xml tests/

      - name: Subir reporte a Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: true

  # --- ETAPA 2: CD (Despliegue Continuo) ---
  deploy-to-render:
    name: Desplegar en Render
    needs: test-and-coverage
    runs-on: ubuntu-latest
    # El despliegue SOLO se ejecuta si el push fue directo a la rama "main"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Disparar Webhook de Despliegue
        run: |
          # El flag -f hace que si Render devuelve un error (ej: 404 o 500), el paso falle en GitHub Actions
          curl -f "${{ secrets.RENDER_DEPLOY_WEBHOOK }}"
